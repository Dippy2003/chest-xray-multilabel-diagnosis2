<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chest X-ray Classifier</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>Multi-label Chest X-ray Classifier</h1>
    <p class="subtitle">Upload a chest X-ray to get per-class predictions + a Grad-CAM heatmap (resnet50, tuned thresholds)</p>

    <form id="upload-form">
      <input type="file" id="file-input" accept="image/*" required />
      <button type="submit">Predict</button>
    </form>

    <div id="result" class="hidden">
      <div class="result-grid">
        <div>
          <h2>Uploaded image</h2>
          <img id="preview-img" alt="uploaded x-ray" />
        </div>
        <div>
          <h2>Grad-CAM (<span id="gradcam-class"></span>)</h2>
          <img id="gradcam-img" alt="gradcam heatmap" />
        </div>
      </div>

      <h2>Predictions</h2>
      <table id="predictions-table">
        <thead>
          <tr><th>Class</th><th>Probability</th><th>Predicted</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <p id="status"></p>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
